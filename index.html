<!DOCTYPE html>
<html>
<head>
  <title>H2 Biology LO Tester</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 24px;
      max-width: 950px;
      margin: auto;
      background: #fafafa;
    }

    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 20px;
      margin-top: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .section-box {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 14px;
      margin-top: 14px;
      background: #fcfcfc;
    }

    .section-title {
      font-weight: bold;
      margin-bottom: 8px;
    }

    button {
      margin-top: 10px;
      padding: 9px 14px;
      border-radius: 8px;
      border: 1px solid #aaa;
      cursor: pointer;
      background: white;
    }

    button:hover { background: #f0f0f0; }

    .wide-button {
      width: 100%;
      max-width: 850px;
      display: block;
      text-align: left;
    }

    textarea {
      width: 95%;
      max-width: 850px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #bbb;
      font-size: 15px;
    }

    .pink { background-color: pink; }

    .issue-tag {
      display: inline-block;
      background: #ffe6ee;
      border: 1px solid #f3aac0;
      padding: 4px 8px;
      border-radius: 8px;
      margin: 4px 4px 4px 0;
      font-size: 14px;
    }

    .context-box {
      background: #f7f7f7;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 14px;
    }

    .label {
      font-weight: bold;
      margin-top: 6px;
    }

  </style>
</head>

<body>

<h2>H2 Biology LO Tester</h2>

<div id="login" class="card">
  <h3>Login</h3>
  <input id="email" placeholder="Enter email">
  <button onclick="login()">Enter</button>
  <p id="loginMsg"></p>
</div>

<div id="modeSelect" class="card" style="display:none;">
  <h3>Select Mode</h3>
  <button onclick="selectMode('builder')">LO Builder Mode</button><br>
  <button onclick="selectMode('self')">Self-Review Mode</button><br>
  <button onclick="selectMode('remediation')">Remediation Mode</button>
</div>

<div id="topics" class="card" style="display:none;">
  <h3>Select Topic</h3>
  <div id="topicList"></div>
</div>

<div id="loChoiceSection" class="card" style="display:none;">
  <div class="context-box">
    <div class="label">Topic</div>
    <div id="choiceTopicName"></div>
    <div class="label">Mode</div>
    <div id="choiceModeName"></div>
  </div>

  <h3>Select LO Question</h3>
  <div id="loChoiceList"></div>
</div>

<div id="loSection" class="card" style="display:none;">
  <div class="context-box">
    <div class="label">Topic</div>
    <div id="currentTopicName"></div>
    <div class="label">Mode</div>
    <div id="currentModeName"></div>
  </div>

  <h3>LO Question</h3>
  <div id="loQuestion"></div>

  <p id="modeInstruction"></p>

  <textarea id="response" rows="6"></textarea><br>
  <button onclick="submitAnswer()">Submit</button>

  <div id="feedback" style="display:none;"></div>
</div>

<script>
const BASE_URL = "https://script.google.com/macros/s/AKfycbwr1KNigX2URrSrlaE9oJ9WzBjoGT1glTziLb2l3Yb67hkIvGeVG3TZrkF7pwMbTJdyXg/exec";

let studentEmail = "";
let currentMode = "";
let currentLO = "";
let currentTopicName = "";
let currentLOs = [];

async function login() {
  const email = document.getElementById("email").value.trim();
  const res = await fetch(`${BASE_URL}?action=validateStudent&email=${encodeURIComponent(email)}`);
  const data = await res.json();

  if (data.valid) {
    studentEmail = email;
    document.getElementById("login").style.display = "none";
    document.getElementById("modeSelect").style.display = "block";
  }
}

function selectMode(mode) {
  currentMode = mode;
  document.getElementById("modeSelect").style.display = "none";
  loadTopics();
}

async function loadTopics() {
  const res = await fetch(`${BASE_URL}?action=getTopics`);
  const data = await res.json();

  document.getElementById("topics").style.display = "block";

  let html = "";
  data.topics.forEach(t => {
    html += `<button onclick="loadTopic('${t.Topic_ID}','${t.Topic_Name}')" class="wide-button">${t.Topic_Name}</button>`;
  });

  document.getElementById("topicList").innerHTML = html;
}

async function loadTopic(id, name) {
  currentTopicName = name;

  const res = await fetch(`${BASE_URL}?action=getTopicLOs&topicId=${id}`);
  const data = await res.json();

  currentLOs = data.los;

  document.getElementById("topics").style.display = "none";

  if (currentMode === "builder") {
    showLOChoice();
  } else {
    loadLO(0);
  }
}

function showLOChoice() {
  document.getElementById("loChoiceSection").style.display = "block";
  document.getElementById("choiceTopicName").innerText = currentTopicName;
  document.getElementById("choiceModeName").innerText = currentMode;

  let html = "";
  currentLOs.forEach((lo, i) => {
    html += `<button onclick="loadLO(${i})" class="wide-button">LO${i+1}: ${lo.LO_Question}</button><br>`;
  });

  document.getElementById("loChoiceList").innerHTML = html;
}

function loadLO(i) {
  const lo = currentLOs[i];
  currentLO = lo.LO_ID;

  document.getElementById("loChoiceSection").style.display = "none";
  document.getElementById("loSection").style.display = "block";

  document.getElementById("currentTopicName").innerText = currentTopicName;
  document.getElementById("currentModeName").innerText = currentMode;
  document.getElementById("loQuestion").innerText = lo.LO_Question;

  document.getElementById("modeInstruction").innerText =
    "Provide your answer. The system will guide you.";

  document.getElementById("response").value = "";
}

async function submitAnswer() {
  const response = document.getElementById("response").value;

  const res = await fetch(`${BASE_URL}?action=checkResponse&email=${studentEmail}&loId=${currentLO}&mode=${currentMode}&response=${encodeURIComponent(response)}`);
  const data = await res.json();

  renderFeedback(response, data);
}

function renderFeedback(response, data) {
  const highlighted = highlight(response, data.highlights || []);
  const issues = renderIssues(data.issueTypes || []);

  let builder = "";
  if (data.builderOutput) {
    data.builderOutput.forEach(b => {
      builder += `<div>• ${b.text}</div>`;
    });
  }

  document.getElementById("feedback").style.display = "block";
  document.getElementById("feedback").innerHTML = `

    <div class="section-box">
      <div class="section-title">Feedback on your submission</div>
      ${issues}
      <div>${highlighted}</div>
    </div>

    <div class="section-box">
      <div class="section-title">Model Answer Suggestion</div>
      ${builder}
    </div>

    <div class="section-box">
      <div class="section-title">Next step</div>
      ${data.message}
    </div>

  `;
}

function renderIssues(arr) {
  return arr.map(a => `<span class="issue-tag">${a}</span>`).join("");
}

function highlight(text, arr) {
  let out = text;
  arr.forEach(h => {
    const r = new RegExp(h, "gi");
    out = out.replace(r, `<span class="pink">${h}</span>`);
  });
  return out;
}

</script>

</body>
</html>
