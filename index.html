<!DOCTYPE html>
<html>
<head>
  <title>H2 Biology LO Tester</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .pink { background-color: pink; }
    button { margin-top: 10px; padding: 8px 12px; }
    textarea { width: 90%; max-width: 700px; }
  </style>
</head>

<body>

<h2>H2 Biology LO Tester</h2>

<div id="login">
  <h3>Login</h3>
  <input id="email" placeholder="Enter email">
  <button onclick="login()">Enter</button>
  <p id="loginMsg"></p>
</div>

<div id="topics" style="display:none;">
  <h3>Select Topic</h3>
  <div id="topicList"></div>
</div>

<div id="loSection" style="display:none;">
  <h3 id="loQuestion"></h3>

  <textarea id="response" rows="4" placeholder="Type your answer here"></textarea><br>
  <button onclick="submitAnswer()">Submit</button>

  <p id="feedback"></p>
</div>

<script>
const BASE_URL = "https://script.google.com/macros/s/AKfycbwr1KNigX2URrSrlaE9oJ9WzBjoGT1glTziLb2l3Yb67hkIvGeVG3TZrkF7pwMbTJdyXg/exec";

let studentEmail = "";
let currentLO = "";

async function login() {
  const email = document.getElementById("email").value.trim();

  const res = await fetch(`${BASE_URL}?action=validateStudent&email=${encodeURIComponent(email)}`);
  const data = await res.json();

  if (data.valid) {
    studentEmail = email;
    document.getElementById("login").style.display = "none";
    loadTopics();
  } else {
    document.getElementById("loginMsg").innerText = "Invalid email";
  }
}

async function loadTopics() {
  const res = await fetch(`${BASE_URL}?action=getTopics`);
  const data = await res.json();

  document.getElementById("topics").style.display = "block";

  let html = "";

  data.topics.forEach(t => {
    const topicId = t.Topic_ID || t.topicId;
    const topicName = t.Topic_Name || t.topicName;

    html += `<button onclick="loadLO('${topicId}')">${topicName}</button><br>`;
  });

  document.getElementById("topicList").innerHTML = html;
}

async function loadLO(topicId) {
  const res = await fetch(`${BASE_URL}?action=getTopicLOs&topicId=${encodeURIComponent(topicId)}`);
  const data = await res.json();

  const lo = data.los[0];

  if (!lo) {
    alert("No LO found for this topic yet.");
    return;
  }

  currentLO = lo.LO_ID || lo.loId;

  document.getElementById("topics").style.display = "none";
  document.getElementById("loSection").style.display = "block";

  document.getElementById("loQuestion").innerText = lo.LO_Question || lo.loQuestion;
}

async function submitAnswer() {
  const response = document.getElementById("response").value;

  const url = `${BASE_URL}?action=checkResponse&email=${encodeURIComponent(studentEmail)}&loId=${encodeURIComponent(currentLO)}&mode=self&response=${encodeURIComponent(response)}`;

  const res = await fetch(url);
  const data = await res.json();

  let feedbackText = response;

  if (data.highlights) {
    data.highlights.forEach(h => {
      const regex = new RegExp(h, "gi");
      feedbackText = feedbackText.replace(regex, `<span class="pink">${h}</span>`);
    });
  }

  document.getElementById("feedback").innerHTML = `
  <h4>Feedback on your submission</h4>
  <div>${feedbackText}</div>

  <h4>Next step</h4>
  <div>${data.correct ? "Correct." : "Please retry your answer."}</div>
`;
}
</script>

</body>
</html>
