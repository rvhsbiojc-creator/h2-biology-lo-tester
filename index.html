<!DOCTYPE html>
<html>
<head>
  <title>H2 Biology LO Tester</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; max-width: 950px; margin: auto; background: #fafafa; }
    .card { background: white; border: 1px solid #ddd; border-radius: 12px; padding: 20px; margin-top: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .section-box { border: 1px solid #ddd; border-radius: 10px; padding: 14px; margin-top: 14px; background: #fcfcfc; }
    .section-title { font-weight: bold; margin-bottom: 8px; }
    button { margin-top: 10px; padding: 9px 14px; border-radius: 8px; border: 1px solid #aaa; cursor: pointer; background: white; }
    button:hover { background: #f0f0f0; }
    .wide-button { width: 100%; max-width: 850px; display: block; text-align: left; line-height: 1.4; }
    textarea { width: 95%; max-width: 850px; padding: 10px; border-radius: 8px; border: 1px solid #bbb; font-size: 15px; margin-top: 6px; }
    input { padding: 8px; border-radius: 8px; border: 1px solid #bbb; min-width: 280px; }
    .pink { background-color: pink; }
    .issue-tag { display: inline-block; background: #ffe6ee; border: 1px solid #f3aac0; padding: 4px 8px; border-radius: 8px; margin: 4px 4px 4px 0; font-size: 14px; }
    .context-box { background: #f7f7f7; border-radius: 10px; padding: 12px; margin-bottom: 14px; border: 1px solid #e0e0e0; }
    .context-grid { display: grid; grid-template-columns: 120px 1fr; gap: 8px 14px; }
    .label { font-weight: bold; color: #333; }
    .lo-question-display { font-size: 20px; font-weight: bold; line-height: 1.4; margin: 10px 0 8px 0; }
    .subtle { color: #666; font-size: 14px; }
    .success-text { font-weight: bold; }
    .hint-line { margin: 8px 0; }
    .student-bullet { margin: 10px 0; line-height: 1.5; }
    .bullet-status { margin-left: 8px; font-style: italic; color: #666; }
    .missing-blank { text-decoration: underline; text-underline-offset: 3px; }
  </style>
</head>

<body>

<h2>H2 Biology LO Tester</h2>

<div id="login" class="card">
  <h3>Login</h3>
  <input id="email" placeholder="Enter email">
  <button onclick="login()">Enter</button>
  <p id="loginMsg"></p>
</div>

<div id="modeSelect" class="card" style="display:none;">
  <h3>Select Mode</h3>
  <button onclick="selectMode('builder')">LO Builder Mode</button><br>
  <button onclick="selectMode('self')">Self-Review Mode</button><br>
  <button onclick="selectMode('remediation')">Remediation Mode</button>
</div>

<div id="topics" class="card" style="display:none;">
  <h3>Select Topic</h3>
  <div id="topicList"></div>
</div>

<div id="loChoiceSection" class="card" style="display:none;">
  <div class="context-box">
    <div class="context-grid">
      <div class="label">Topic</div><div id="choiceTopicName"></div>
      <div class="label">Mode</div><div id="choiceModeName"></div>
    </div>
  </div>
  <h3>Select LO Question</h3>
  <div id="loChoiceList"></div>
</div>

<div id="loSection" class="card" style="display:none;">
  <div class="context-box">
    <div class="context-grid">
      <div class="label">Topic</div><div id="currentTopicName"></div>
      <div class="label">Mode</div><div id="currentModeName"></div>
    </div>
  </div>

  <h3>LO Question</h3>
  <div id="loQuestion" class="lo-question-display"></div>
  <p id="modeInstruction"></p>

  <div id="answerArea"></div>
  <button onclick="submitAnswer()">Submit</button>

  <div id="feedback" style="display:none;"></div>
</div>

<script>
const BASE_URL = "https://script.google.com/macros/s/AKfycbwr1KNigX2URrSrlaE9oJ9WzBjoGT1glTziLb2l3Yb67hkIvGeVG3TZrkF7pwMbTJdyXg/exec";

let studentEmail = "";
let currentMode = "";
let currentLO = "";
let currentTopicName = "";
let currentLOs = [];
let currentLOPackage = null;
let selfAttemptNo = 1;

async function login() {
  const email = document.getElementById("email").value.trim();
  const res = await fetch(`${BASE_URL}?action=validateStudent&email=${encodeURIComponent(email)}`);
  const data = await res.json();

  if (data.valid) {
    studentEmail = email;
    document.getElementById("login").style.display = "none";
    document.getElementById("modeSelect").style.display = "block";
  } else {
    document.getElementById("loginMsg").innerText = "Invalid email";
  }
}

function selectMode(mode) {
  currentMode = mode;
  document.getElementById("modeSelect").style.display = "none";
  loadTopics();
}

async function loadTopics() {
  const res = await fetch(`${BASE_URL}?action=getTopics`);
  const data = await res.json();
  document.getElementById("topics").style.display = "block";

  let html = "";
  data.topics.forEach(t => {
    html += `<button onclick="loadTopic('${escapeJs(t.Topic_ID)}','${escapeJs(t.Topic_Name)}')" class="wide-button">${escapeHtml(t.Topic_Name)}</button>`;
  });
  document.getElementById("topicList").innerHTML = html;
}

async function loadTopic(id, name) {
  currentTopicName = name;
  const res = await fetch(`${BASE_URL}?action=getTopicLOs&topicId=${encodeURIComponent(id)}`);
  const data = await res.json();

  currentLOs = data.los || [];
  document.getElementById("topics").style.display = "none";
  showLOChoice();
}

function showLOChoice() {
  document.getElementById("loSection").style.display = "none";
  document.getElementById("loChoiceSection").style.display = "block";
  document.getElementById("choiceTopicName").innerText = currentTopicName;
  document.getElementById("choiceModeName").innerText = getModeDisplayName(currentMode);

  let html = "";
  currentLOs.forEach((lo, i) => {
    html += `<button onclick="loadLO(${i})" class="wide-button">LO${i + 1}: ${escapeHtml(lo.LO_Question)}</button><br>`;
  });
  document.getElementById("loChoiceList").innerHTML = html;
}

async function loadLO(i) {
  const lo = currentLOs[i];
  currentLO = lo.LO_ID;
  selfAttemptNo = 1;

  const pkgRes = await fetch(`${BASE_URL}?action=getLOPackage&loId=${encodeURIComponent(currentLO)}`);
  currentLOPackage = await pkgRes.json();

  document.getElementById("loChoiceSection").style.display = "none";
  document.getElementById("loSection").style.display = "block";
  document.getElementById("feedback").style.display = "none";

  document.getElementById("currentTopicName").innerText = currentTopicName;
  document.getElementById("currentModeName").innerText = getModeDisplayName(currentMode);
  document.getElementById("loQuestion").innerText = lo.LO_Question;

  renderAnswerArea();

  if (currentMode === "builder") {
    document.getElementById("modeInstruction").innerText =
      "Provide your answer to the LO Question. The LO Builder will guide you to writing the correct and complete LO.";
  } else if (currentMode === "self") {
    document.getElementById("modeInstruction").innerText =
      "Provide your answer to check if you have key terms, accurate phrasing and complete LO.";
  } else {
    document.getElementById("modeInstruction").innerText =
      "Provide your answer to the LO Question. The system will guide you after your attempt.";
  }
}

function renderAnswerArea() {
  const area = document.getElementById("answerArea");

  if (currentMode === "self") {
    const bullets = currentLOPackage.answerBullets || [];
    const bulletPrompts = bullets.map(() => "• ").join("\n");

    area.innerHTML = `
      <div class="section-box">
        <div class="section-title">Answer Structure</div>
        <div>You are expected to answer in <strong>${bullets.length}</strong> bullet(s).</div>
      </div>
      <textarea id="singleResponse" rows="${Math.max(5, bullets.length * 2)}">${bulletPrompts}</textarea>
    `;
  } else {
    area.innerHTML = `<textarea id="singleResponse" rows="6" placeholder="Type your answer here"></textarea>`;
  }
}

async function submitAnswer() {
  const responsePayload = document.getElementById("singleResponse").value;

  const res = await fetch(`${BASE_URL}?action=checkResponse&email=${encodeURIComponent(studentEmail)}&loId=${encodeURIComponent(currentLO)}&mode=${encodeURIComponent(currentMode)}&attemptNo=${selfAttemptNo}&response=${encodeURIComponent(responsePayload)}`);
  const data = await res.json();

  if (currentMode === "self") {
    renderSelfFeedback(data);
    if (!data.correct) selfAttemptNo++;
  } else {
    renderGeneralFeedback(responsePayload, data);
  }
}

function renderSelfFeedback(data) {
  const issues = renderIssues(data.issueTypes || []);

  let bulletFeedback = "";
  data.bulletResults.forEach((b, i) => {
    const highlighted = highlight(b.responseText, b.highlights || []);
    const blanks = (b.missingBlanks || []).map(blank => `<span class="missing-blank">${escapeHtml(blank)}</span>`).join(" ");
    const bulletIssues = b.issueTypes && b.issueTypes.length > 0
      ? ` - ${b.issueTypes.map(escapeHtml).join(" with ")}`
      : "";

    bulletFeedback += `
      <div class="student-bullet">
        <strong>Bullet ${i + 1}:</strong><br>
        • ${highlighted}${blanks ? " " + blanks : ""}
        <span class="bullet-status">${bulletIssues}</span>
      </div>
    `;
  });

  let hints = "";
  if (!data.correct && data.hintOutput) {
    hints += `<div class="section-box"><div class="section-title">Answer Structure Hint</div>`;
    data.hintOutput.forEach((h, i) => {
      hints += `<div class="hint-line"><strong>Bullet ${i + 1}:</strong> ${escapeHtml(h.hint || "No hint needed for this bullet.")}</div>`;
    });
    hints += `</div>`;
  }

  let successOptions = "";
  if (data.correct) {
    successOptions = `
      <div class="section-box">
        <div class="section-title">Choose your next action</div>
        <button onclick="showLOChoice()">Next LO</button>
        <button onclick="endSession()">End Session</button>
      </div>
    `;
  }

  document.getElementById("feedback").style.display = "block";
  document.getElementById("feedback").innerHTML = `
    <div class="section-box">
      <div class="section-title">Feedback on your submission</div>
      ${issues}
      ${bulletFeedback}
    </div>

    ${hints}

    <div class="section-box">
      <div class="section-title">Next step</div>
      <div>${data.correct ? "<span class='success-text'>Correct.</span>" : escapeHtml(data.message)}</div>
    </div>

    ${successOptions}
  `;
}

function renderGeneralFeedback(response, data) {
  const highlighted = highlight(response, data.highlights || []);
  const issues = renderIssues(data.issueTypes || []);

  let builder = "";
  if (data.builderOutput) {
    data.builderOutput.forEach(b => {
      builder += `<div>• ${escapeHtml(b.text)}</div>`;
    });
  }

  let commonQuestions = "";
  if (data.correct && data.commonQuestions && data.commonQuestions.length > 0) {
    commonQuestions += `<div class="section-box"><div class="section-title">Additional common questions</div>`;
    data.commonQuestions.forEach(q => {
      commonQuestions += `<div>• ${escapeHtml(q.Common_Question)}</div>`;
    });
    commonQuestions += `</div>`;
  }

  document.getElementById("feedback").style.display = "block";
  document.getElementById("feedback").innerHTML = `
    <div class="section-box">
      <div class="section-title">Feedback on your submission</div>
      ${issues}
      <div>${highlighted}</div>
    </div>

    <div class="section-box">
      <div class="section-title">Model Answer Suggestion</div>
      ${builder}
    </div>

    <div class="section-box">
      <div class="section-title">Next step</div>
      <div>${escapeHtml(data.message)}</div>
    </div>

    ${commonQuestions}
  `;
}

function endSession() {
  document.getElementById("loSection").style.display = "none";
  document.getElementById("feedback").style.display = "none";
  document.getElementById("modeSelect").style.display = "block";
}

function renderIssues(arr) {
  if (!arr || arr.length === 0) return "";
  return arr.map(a => `<span class="issue-tag">${escapeHtml(a)}</span>`).join("");
}

function highlight(text, arr) {
  let out = escapeHtml(text);
  arr.forEach(h => {
    const r = new RegExp(escapeRegExp(h), "gi");
    out = out.replace(r, match => `<span class="pink">${match}</span>`);
  });
  return out;
}

function getModeDisplayName(mode) {
  if (mode === "builder") return "LO Builder Mode";
  if (mode === "self") return "Self-Review Mode";
  if (mode === "remediation") return "Remediation Mode";
  return mode;
}

function escapeHtml(text) {
  return String(text || "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
}

function escapeRegExp(text) {
  return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function escapeJs(text) {
  return String(text || "").replaceAll("\\", "\\\\").replaceAll("'", "\\'");
}
</script>

</body>
</html>
