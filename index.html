<!DOCTYPE html>
<html>
<head>
  <title>H2 Biology LO Tester</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 24px;
      max-width: 950px;
      margin: auto;
      background: #fafafa;
    }

    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 20px;
      margin-top: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    button {
      margin-top: 10px;
      padding: 9px 14px;
      border-radius: 8px;
      border: 1px solid #aaa;
      cursor: pointer;
      background: white;
      text-align: left;
    }

    button:hover { background: #f0f0f0; }

    .wide-button {
      width: 100%;
      max-width: 850px;
      display: block;
      line-height: 1.4;
    }

    textarea {
      width: 95%;
      max-width: 850px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #bbb;
      font-size: 15px;
    }

    .pink { background-color: pink; }

    .bullet {
      margin: 8px 0;
      line-height: 1.5;
    }

    .small-note {
      color: #666;
      font-size: 14px;
    }

    .label {
      font-weight: bold;
      margin-top: 8px;
    }

    .context-box {
      background: #f7f7f7;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 14px;
      border: 1px solid #e0e0e0;
    }

    .lo-choice { margin-bottom: 8px; }

    .issue-tag {
      display: inline-block;
      background: #ffe6ee;
      border: 1px solid #f3aac0;
      padding: 4px 8px;
      border-radius: 8px;
      margin: 4px 4px 4px 0;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h2>H2 Biology LO Tester</h2>

<div id="login" class="card">
  <h3>Login</h3>
  <input id="email" placeholder="Enter email">
  <button onclick="login()">Enter</button>
  <p id="loginMsg"></p>
</div>

<div id="modeSelect" class="card" style="display:none;">
  <h3>Select Mode</h3>
  <button onclick="selectMode('builder')">LO Builder Mode</button><br>
  <button onclick="selectMode('self')">Self-Review Mode</button><br>
  <button onclick="selectMode('remediation')">Remediation Mode</button>
</div>

<div id="topics" class="card" style="display:none;">
  <h3>Select Topic</h3>
  <div id="topicList"></div>
</div>

<div id="loChoiceSection" class="card" style="display:none;">
  <div class="context-box">
    <div class="label">Topic</div>
    <div id="choiceTopicName"></div>
    <div class="label">Mode</div>
    <div id="choiceModeName"></div>
  </div>

  <h3>Select LO Question</h3>
  <div id="loChoiceList"></div>
</div>

<div id="loSection" class="card" style="display:none;">
  <div class="context-box">
    <div class="label">Topic</div>
    <div id="currentTopicName"></div>
    <div class="label">Mode</div>
    <div id="currentModeName"></div>
  </div>

  <h3>LO Question</h3>
  <div id="loQuestion"></div>

  <p id="modeInstruction" class="small-note"></p>

  <textarea id="response" rows="6" placeholder="Type your answer here"></textarea><br>
  <button onclick="submitAnswer()">Submit</button>

  <div id="feedback" class="card" style="display:none;"></div>
</div>

<script>
const BASE_URL = "https://script.google.com/macros/s/AKfycbwr1KNigX2URrSrlaE9oJ9WzBjoGT1glTziLb2l3Yb67hkIvGeVG3TZrkF7pwMbTJdyXg/exec";

let studentEmail = "";
let currentLO = "";
let currentMode = "";
let currentTopicId = "";
let currentTopicName = "";
let currentLOs = [];

async function login() {
  const email = document.getElementById("email").value.trim();
  const res = await fetch(`${BASE_URL}?action=validateStudent&email=${encodeURIComponent(email)}`);
  const data = await res.json();

  if (data.valid) {
    studentEmail = email;
    document.getElementById("login").style.display = "none";
    document.getElementById("modeSelect").style.display = "block";
  } else {
    document.getElementById("loginMsg").innerText = "Invalid email";
  }
}

function selectMode(mode) {
  currentMode = mode;
  document.getElementById("modeSelect").style.display = "none";
  loadTopics();
}

async function loadTopics() {
  const res = await fetch(`${BASE_URL}?action=getTopics`);
  const data = await res.json();

  document.getElementById("topics").style.display = "block";

  let html = "";
  data.topics.forEach(t => {
    const topicId = t.Topic_ID || t.topicId;
    const topicName = t.Topic_Name || t.topicName;
    html += `<button onclick="loadTopic('${escapeJs(topicId)}', '${escapeJs(topicName)}')" class="wide-button">${topicName}</button>`;
  });

  document.getElementById("topicList").innerHTML = html;
}

async function loadTopic(topicId, topicName) {
  currentTopicId = topicId;
  currentTopicName = topicName;

  const res = await fetch(`${BASE_URL}?action=getTopicLOs&topicId=${encodeURIComponent(topicId)}`);
  const data = await res.json();

  currentLOs = data.los || [];

  if (currentLOs.length === 0) {
    alert("No LO found for this topic yet.");
    return;
  }

  document.getElementById("topics").style.display = "none";

  if (currentMode === "builder") {
    showLOChoiceList();
  } else {
    loadSelectedLO(0);
  }
}

function showLOChoiceList() {
  document.getElementById("loChoiceSection").style.display = "block";
  document.getElementById("choiceTopicName").innerText = currentTopicName;
  document.getElementById("choiceModeName").innerText = getModeDisplayName(currentMode);

  let html = "";
  currentLOs.forEach((lo, index) => {
    const question = lo.LO_Question || lo.loQuestion;
    html += `
      <div class="lo-choice">
        <button onclick="loadSelectedLO(${index})" class="wide-button">
          LO${index + 1}: ${escapeHtml(question)}
        </button>
      </div>
    `;
  });

  document.getElementById("loChoiceList").innerHTML = html;
}

function loadSelectedLO(index) {
  const lo = currentLOs[index];
  currentLO = lo.LO_ID || lo.loId;

  document.getElementById("loChoiceSection").style.display = "none";
  document.getElementById("topics").style.display = "none";
  document.getElementById("loSection").style.display = "block";
  document.getElementById("feedback").style.display = "none";

  document.getElementById("currentTopicName").innerText = currentTopicName;
  document.getElementById("currentModeName").innerText = getModeDisplayName(currentMode);
  document.getElementById("loQuestion").innerText = lo.LO_Question || lo.loQuestion;
  document.getElementById("response").value = "";

  if (currentMode === "builder") {
    document.getElementById("modeInstruction").innerText =
      "Provide your answer to the LO Question. The LO Builder will guide you to writing the correct and complete LO.";
  } else if (currentMode === "self") {
    document.getElementById("modeInstruction").innerText =
      "Provide your answer to the LO Question. Incorrect words or phrases will be highlighted.";
  } else {
    document.getElementById("modeInstruction").innerText =
      "Provide your answer to the LO Question. The system will guide you after your attempt.";
  }
}

async function submitAnswer() {
  const response = document.getElementById("response").value;

  const url = `${BASE_URL}?action=checkResponse&email=${encodeURIComponent(studentEmail)}&loId=${encodeURIComponent(currentLO)}&mode=${encodeURIComponent(currentMode)}&response=${encodeURIComponent(response)}`;

  const res = await fetch(url);
  const data = await res.json();

  if (currentMode === "builder") {
    renderBuilderFeedback(response, data);
  } else {
    renderNormalFeedback(response, data);
  }
}

function renderBuilderFeedback(response, data) {
  const highlightedResponse = highlightIncorrect(response, data.highlights || []);
  const issueHtml = renderIssueTags(data.issueTypes || []);

  let builderHtml = "";
  if (data.builderOutput) {
    data.builderOutput.forEach(item => {
      builderHtml += `<div class="bullet">• ${escapeHtml(item.text)}</div>`;
    });
  }

  let commonQuestionsHtml = "";
  if (data.correct && data.commonQuestions && data.commonQuestions.length > 0) {
    commonQuestionsHtml += `<h4>Additional common questions</h4>`;
    data.commonQuestions.forEach(q => {
      commonQuestionsHtml += `<div class="bullet">• ${escapeHtml(q.Common_Question)}</div>`;
    });
  }

  document.getElementById("feedback").style.display = "block";
  document.getElementById("feedback").innerHTML = `
    <h4>Feedback on your submission</h4>
    ${issueHtml}
    <div>${highlightedResponse}</div>

    <h4>Model Answer Suggestion</h4>
    ${builderHtml}

    <h4>Next step</h4>
    <div>${escapeHtml(data.message)}</div>

    ${commonQuestionsHtml}
  `;
}

function renderNormalFeedback(response, data) {
  const highlightedResponse = highlightIncorrect(response, data.highlights || []);
  const issueHtml = renderIssueTags(data.issueTypes || []);

  document.getElementById("feedback").style.display = "block";
  document.getElementById("feedback").innerHTML = `
    <h4>Feedback on your submission</h4>
    ${issueHtml}
    <div>${highlightedResponse}</div>

    <h4>Next step</h4>
    <div>${data.correct ? "Correct." : "Please retry your answer."}</div>
  `;
}

function renderIssueTags(issues) {
  if (!issues || issues.length === 0) return "";
  let html = `<div>`;
  issues.forEach(issue => {
    html += `<span class="issue-tag">${escapeHtml(issue)}</span>`;
  });
  html += `</div>`;
  return html;
}

function getModeDisplayName(mode) {
  if (mode === "builder") return "LO Builder Mode";
  if (mode === "self") return "Self-Review Mode";
  if (mode === "remediation") return "Remediation Mode";
  return mode;
}

function highlightIncorrect(text, highlights) {
  let output = escapeHtml(text);

  highlights.forEach(h => {
    const escaped = escapeRegExp(h);
    const regex = new RegExp(escaped, "gi");
    output = output.replace(regex, match => `<span class="pink">${match}</span>`);
  });

  return output;
}

function escapeHtml(text) {
  return String(text || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

function escapeRegExp(text) {
  return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function escapeJs(text) {
  return String(text || "")
    .replaceAll("\\", "\\\\")
    .replaceAll("'", "\\'");
}
</script>

</body>
</html>
